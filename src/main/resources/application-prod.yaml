# ═══════════════════════════════════════════════════
#  PROD PROFILE — runs on Render
#  ALL values come from Render Environment Variables
#  Never hardcode secrets here
#
#  Set these in Render Dashboard > Environment:
#    SPRING_PROFILES_ACTIVE = prod
#    DB_URL                 = jdbc:mysql://your-aiven-host:port/jobpilot_db?ssl-mode=REQUIRED
#    DB_USERNAME            = your-aiven-username
#    DB_PASSWORD            = your-aiven-password
#    JWT_SECRET             = (generate: openssl rand -hex 64)
#    GEMINI_API_KEY         = AIza...your-key
#    SENDGRID_API_KEY       = SG...your-key
#    SENDGRID_FROM_EMAIL    = noreply@yourdomain.com
#    CORS_ALLOWED_ORIGINS   = https://your-netlify-app.netlify.app
#    RESUME_UPLOAD_DIR      = uploads/resumes
# ═══════════════════════════════════════════════════

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    show-sql: false

logging:
  level:
    com.jobPilot: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO