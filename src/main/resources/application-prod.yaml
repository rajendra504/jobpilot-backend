spring:
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    url: ${DATASOURCE_URL}
    user: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: 36000000

sendgrid:
  api:
    key: ${SENDGRID_API_KEY}
    sender-email: ${SENDGRID_SENDER_EMAIL}

logging:
  level:
    com.jobPilot: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO