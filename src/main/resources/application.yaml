spring:
  application:
    name: jobPilot-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/job_pilot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  servlet:
    context-path: /api


app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.0-flash
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    sender-email: ${SENDGRID_FROM_EMAIL}
    from-name: JobPilot
  upload:
    resume-dir: ${RESUME_UPLOAD_DIR:uploads/resumes}
  playwright:
    headless: false
  scraper:
    cron: "0 30 1 * * *"
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  encryption:
    secret: ${ENCRYPTION_SECRET}

logging:
  level:
    com.jobPilot: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO